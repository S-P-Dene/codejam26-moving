<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css">
    html,
    body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #overlay-container {
      width: 640px;
      height: 480px;
    }

    #skip {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 10px 18px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid white;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
	  animation: pulse 1s infinite ease-in-out;
    }
	
	@keyframes pulse {
        0%,100% {
            transform: scale(1);
        }
        50% {
            transform: scale(1.2);
        }
    }
  </style>
</head>

<body>
  <div id="overlay-container">
    <button id="skip">
      Skip Ad&nbsp;&nbsp;&#x25B6;&#x23B8;
    </button>
  </div>

  <script type="text/javascript">
    (function(window, document){

      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      } 

      window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'adFinished') {
          window.top.postMessage({ type: 'fail' }, '*');
        }
      });

      skip.addEventListener('click', () => adSuccess());
		   
      document.addEventListener('mousemove', (event) => {
	    let mouseX = event.clientX;
		let mouseY = event.clientY;
  
		const skip_bb = skip.getBoundingClientRect();
		
		// mouse near Skip button
		if (mouseX > skip_bb.left - 40 && mouseX < skip_bb.right + 40) {
		  if (mouseY > skip_bb.top - 40 && mouseY < skip_bb.bottom + 40) {
			if (skip.style.bottom == "20px") {
			  skip.style.bottom = "auto";
			  skip.style.top = "20px";
			}
			else {
			  skip.style.bottom = "20px";
			  skip.style.top = "auto";
			}				  
		  }
	    }
	  });

    })(window, document);
  </script>
</body>
</html>
